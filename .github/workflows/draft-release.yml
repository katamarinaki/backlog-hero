name: Draft Release on Push to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  draft:
    name: Create/Update Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Auto-increment Version and Create Draft
        shell: bash
        run: |
          # Get latest published release tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          V="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$V"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          NEW_TAG="v${NEW_VERSION}"

          echo "Latest release: $LATEST_TAG"
          echo "New draft:       $NEW_TAG"

          # Remove any existing draft with this tag
          gh release delete "$NEW_TAG" --yes 2>/dev/null || true
          git push origin --delete "$NEW_TAG" 2>/dev/null || true

          # Create a lightweight tag so generateReleaseNotes works
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          # Create draft release with auto-generated changelog since previous tag
          gh release create "$NEW_TAG" \
            --draft \
            --generate-notes \
            --title "$NEW_TAG" \
            --notes-start-tag "$LATEST_TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
