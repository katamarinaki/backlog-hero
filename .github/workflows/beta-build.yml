name: Beta Build

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Set Beta Version
        shell: bash
        run: |
          # Get the latest published (non-draft, non-prerelease) release tag
          BASE_TAG=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases --json tagName -q '.[0].tagName' 2>/dev/null || echo "v0.0.0")
          BASE_VERSION="${BASE_TAG#v}"
          # Beta version must be higher than stable so it is an upgrade, not a downgrade
          NEXT_PATCH=$(echo "$BASE_VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          BETA_VERSION="${NEXT_PATCH}-beta.${{ github.run_number }}"
          npm version "$BETA_VERSION" --no-git-tag-version
          echo "Building beta version $BETA_VERSION (next after stable $BASE_VERSION)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Distributables
        run: npm run dist -- --publish=never

      - name: Collect Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*Setup*.exe
            release/**/*.AppImage
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/app-update.yml

  release:
    name: Update Beta Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: beta-artifacts
          merge-multiple: true

      - name: Update Beta Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          draft: false
          prerelease: true
          generateReleaseNotes: true
          tag: beta
          name: Beta (develop)
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Automated beta build from the `develop` branch.

            To use: enable **Use beta updates** in the app settings.
          artifacts: |
            beta-artifacts/**/*.dmg
            beta-artifacts/**/*.zip
            beta-artifacts/**/*.AppImage
            beta-artifacts/**/*.blockmap
            beta-artifacts/**/latest*.yml
            beta-artifacts/**/app-update.yml
            beta-artifacts/**/*Setup*.exe
