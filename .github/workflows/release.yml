name: Build and Draft Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Set Release Version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            # release: published — tag already exists
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          npm version "$VERSION" --no-git-tag-version
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building release $TAG ($VERSION)"

      - name: Build Distributables
        run: |
          npm run dist -- --publish=never
          # Remove ALL embedded code signatures (not just _CodeSignature folders).
          # Electron framework binaries carry embedded signatures that Squirrel.Mac validates.
          for zipfile in release/*.zip; do
            [ -f "$zipfile" ] || continue
            tmpdir="$(mktemp -d)"
            unzip -q "$zipfile" -d "$tmpdir"
            codesign --deep --remove-signature "$tmpdir"/*.app 2>/dev/null || true
            find "$tmpdir" -name _CodeSignature -type d -exec rm -rf {} + 2>/dev/null || true
            rm -f "$zipfile"
            ditto -c -k --sequesterRsrc --keepParent "$tmpdir"/*.app "$zipfile"
            rm -rf "$tmpdir"
            # Recompute sha512 (electron-updater verifies this)
            NEW_SHA=$(shasum -a 512 "$zipfile" | awk '{print $1}' | xxd -r -p | base64)
            NEW_SIZE=$(stat -f%z "$zipfile")
            ZIPNAME=$(basename "$zipfile")
            # Update latest-mac.yml with new sha512 and size
            for ymlfile in release/latest-mac.yml; do
              [ -f "$ymlfile" ] || continue
              sed -i '' "s/^sha512:.*/sha512: $NEW_SHA/" "$ymlfile"
              # Update the zip file entry's sha512 (first in files list)
              awk -v sha="$NEW_SHA" -v sz="$NEW_SIZE" '
                /^- url:.*\.zip$/ { in_zip=1; print; next }
                in_zip && /sha512:/ { print "    sha512: " sha; next }
                in_zip && /size:/ { print "    size: " sz; in_zip=0; next }
                { print }
              ' "$ymlfile" > "$ymlfile.tmp" && mv "$ymlfile.tmp" "$ymlfile"
            done
            # Delete stale blockmap (differential download will fall back to full)
            rm -f "release/${ZIPNAME}.blockmap"
            echo "Stripped signatures + updated yml for $ZIPNAME ($NEW_SIZE bytes)"
          done

      - name: Collect Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*Setup*.exe
            release/**/*.AppImage
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/app-update.yml

  release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Upload Build Artifacts
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Install
            - Windows: download and run the `Backlog Hero Setup.exe` installer.
            - macOS: download and open the `Backlog Hero.dmg` file.
            - Linux: download the `Backlog Hero.AppImage`, make it executable (`chmod +x`), and run it.

            Notes
            - Auto-update files (`latest*.yml`, `app-update.yml`, `*.blockmap`) are for the app and can be ignored.
          artifacts: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
            release-artifacts/**/app-update.yml
            release-artifacts/**/*Setup*.exe
