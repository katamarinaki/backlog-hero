name: Build and Draft Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Set Release Version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"           # e.g. v1.0.1
          VERSION="${TAG#v}"                     # e.g. 1.0.1
          npm version "$VERSION" --no-git-tag-version
          echo "Building release version $VERSION"

      - name: Build Distributables
        run: npm run dist -- --publish=never

      - name: Collect Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/**/*.dmg
            release/**/*Setup*.exe
            release/**/*.AppImage
            release/**/*.blockmap
            release/**/latest*.yml
            release/**/app-update.yml

  release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Draft Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Install
            - Windows: download and run the `Backlog Hero Setup.exe` installer.
            - macOS: download and open the `Backlog Hero.dmg` file.
            - Linux: download the `Backlog Hero.AppImage`, make it executable (`chmod +x`), and run it.

            Notes
            - Auto-update files (`latest*.yml`, `app-update.yml`, `*.blockmap`) are for the app and can be ignored.
          artifacts: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
            release-artifacts/**/app-update.yml
            release-artifacts/**/*Setup*.exe
